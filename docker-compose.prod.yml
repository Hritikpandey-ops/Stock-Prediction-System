# Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    restart: always
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Remove volume mounts and hot-reload for production
    volumes: []
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level warning
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
